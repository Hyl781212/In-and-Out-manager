<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>物资出入库管理（恩施市CDC重大疾病科）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft Yahei",sans-serif;font-size:14px}
body{max-width:100%;margin:10px auto;padding:0 8px;background:#f5f7fa}
/* 标题样式修改 */
.main-title{
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    margin:15px 0 4px 0;
    color:#222;
}
.sub-title{
    text-align: center;
    font-size: 16px;
    font-weight: normal;
    margin-bottom:15px;
    color:#333;
}
h2{margin:8px 0;color:#222;font-size:16px}
.box{background:#fff;padding:12px;border-radius:8px;box-shadow:0 1px 6px #ddd;margin-bottom:15px}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
input,select,label{padding:6px 4px;border:1px solid #ccc;border-radius:4px;font-size:14px}
input[readonly]{background:#eee;color:#666}
.hide{display:none!important}
.edit-tip{color:#f53f3f;font-weight:bold}
button{padding:7px 10px;border:none;border-radius:4px;cursor:pointer;color:#fff;font-size:13px;white-space:nowrap}
.btn-in{background:#00b42a}
.btn-out{background:#ff7700}
.btn-del{background:#f53f3f}
.btn-edit{background:#4096ff}
.btn-clear{background:#86909c}
.btn-export{background:#1677ff}
.btn-backup{background:#009688}
.btn-import{background:#722ed1}
table{width:100%;border-collapse:collapse;margin-top:8px}
table th,table td{border:1px solid #e5e6eb;padding:6px 2px;text-align:center;font-size:12px}
table th{background:#f2f3f5}
#in_num {width: 80px;min-width: 80px;}
#out_num {width: 80px;min-width: 80px;}
#show_stock {width: 70px;min-width: 70px;}
#out_dept {width: 80px;min-width: 80px;}
#out_user {width: 80px;min-width: 80px;}
#in_valid_date {width: 130px;min-width:130px;}
#out_valid_show {width:120px;min-width:120px;}
#in_type,#in_factory,#in_spec,#custom_dept,#out_note {min-width: 110px;}
.low-stock {color: #f53f3f;font-weight: bold;}
.low-valid {color: #f53f3f;font-weight: bold;}
#fileInput{display: none;}
.table-wrap{overflow-x:auto; -webkit-overflow-scrolling: touch;}

/* 编辑弹窗样式 */
.modal-mask{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999;
}
.modal-box{
    background:#fff;width:92%;max-width:520px;padding:16px;border-radius:8px;max-height:90vh;overflow-y:auto;
}
.modal-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;align-items:center}
.modal-row label{width:90px;text-align:right;border:none;padding:0}
.modal-row input,.modal-row select{flex:1;min-width:120px}
.modal-btns{display:flex;gap:10px;justify-content:center;margin-top:16px}
</style>
</head>
<body>
<div class="main-title">物资出入库管理</div>
<div class="sub-title">（恩施市CDC重大疾病科）</div>

<div class="box">
<h2>数据备份/迁移</h2>
<div class="row">
<button class="btn-backup" onclick="exportAllData()">导出全部数据备份</button>
<button class="btn-import" onclick="document.getElementById('fileInput').click()">导入备份文件</button>
<input type="file" id="fileInput" accept=".json" onchange="importAllData(this)">
</div>
<span style="color:#666;font-size:12px">提示：导出文件在微信【我-文件-下载】，请勿转发文件，转发会损坏无法导入</span>
</div>

<div class="box">
<h2>物资入库 <span class="edit-tip" id="editTip"></span></h2>
<div class="row">
<input type="text" id="in_type" placeholder="类别名称">
<input type="text" id="in_factory" placeholder="厂家">
<input type="text" id="in_spec" placeholder="规格">
<input type="number" id="in_num" placeholder="数量" min="1">
<label>效期</label><input type="date" id="in_valid_date">
<input type="text" id="in_note" placeholder="备注">
<button class="btn-in" onclick="stockIn()">确认入库</button>
<button class="btn-clear" onclick="clearInInput()">清空</button>
</div>
<span style="color:#999;font-size:12px">效期日期选填，不选代表无有效期</span>
</div>

<div class="box">
<h2>物资出库</h2>
<div class="row">
<select id="out_type" onchange="loadFactory();clearOutValid()">
<option value="">请选择类别</option>
</select>
<select id="out_factory" onchange="loadSpec();clearOutValid()">
<option value="">请选择厂家</option>
</select>
<select id="out_spec" onchange="showStockAndValid()">
<option value="">请选择规格</option>
</select>
<input type="number" id="out_num" placeholder="出库数" min="1">
<input readonly id="out_valid_show" placeholder="效期截止日">
<select id="out_dept" onchange="toggleCustomDept()">
<option value="">领用单位</option>
<option value="舞阳坝">舞阳坝</option>
<option value="小渡船">小渡船</option>
<option value="金子坝">金子坝</option>
<option value="七里坪">七里坪</option>
<option value="六角亭">六角亭</option>
<option value="三岔">三岔</option>
<option value="新塘">新塘</option>
<option value="红土">红土</option>
<option value="屯堡">屯堡</option>
<option value="沐抚">沐抚</option>
<option value="板桥">板桥</option>
<option value="白果">白果</option>
<option value="盛家">盛家</option>
<option value="芭蕉">芭蕉</option>
<option value="沙地">沙地</option>
<option value="崔坝">崔坝</option>
<option value="龙凤">龙凤</option>
<option value="太阳">太阳</option>
<option value="白杨">白杨</option>
<option value="其他">其他</option>
</select>
<input type="text" id="custom_dept" class="hide" placeholder="填写单位">
<input type="text" id="out_user" placeholder="领用人">
<input id="out_note" placeholder="备注">
<input readonly id="show_stock" placeholder="库存">
<button class="btn-out" onclick="stockOut()">确认出库</button>
<button class="btn-clear" onclick="resetOut()">清空</button>
</div>
</div>

<div class="box">
<h2>全部库存清单</h2>
<div class="table-wrap">
<table id="stock_table">
<thead>
<tr>
<th>类别</th>
<th>厂家</th>
<th>规格</th>
<th>库存</th>
<th>有效期(月)</th>
<th>操作</th>
</tr>
<tbody></tbody>
</table>
</div>
</div>

<div class="box">
<div class="row" style="justify-content: space-between;align-items:center;">
<h2>出入库操作记录</h2>
<div class="row">
<button class="btn-export" onclick="exportRecord()">导出CSV报表</button>
<button class="btn-del" onclick="delAllRecords()" style="margin-left:6px">删除全部记录</button>
</div>
</div>
<div class="table-wrap">
<table id="record_table">
<thead>
<tr>
<th>时间</th>
<th>类别</th>
<th>厂家</th>
<th>规格</th>
<th>数量</th>
<th>效期截止日</th>
<th>领用单位</th>
<th>领用人</th>
<th>类型</th>
<th>备注</th>
<th>操作</th>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-mask" id="editModal">
    <div class="modal-box">
        <h3 style="text-align:center;margin-bottom:12px">编辑记录</h3>
        <input type="hidden" id="editIndex">
        <div class="modal-row">
            <label>操作类型</label>
            <select id="editOptType">
                <option value="入库">入库</option>
                <option value="出库">出库</option>
            </select>
        </div>
        <div class="modal-row">
            <label>类别</label>
            <input type="text" id="editType">
        </div>
        <div class="modal-row">
            <label>厂家</label>
            <input type="text" id="editFactory">
        </div>
        <div class="modal-row">
            <label>规格</label>
            <input type="text" id="editSpec">
        </div>
        <div class="modal-row">
            <label>数量</label>
            <input type="number" min="1" id="editNum">
        </div>
        <div class="modal-row">
            <label>效期截止日</label>
            <input type="date" id="editValid">
        </div>
        <div class="modal-row">
            <label>领用单位</label>
            <input type="text" id="editDept">
        </div>
        <div class="modal-row">
            <label>领用人</label>
            <input type="text" id="editUser">
        </div>
        <div class="modal-row">
            <label>备注</label>
            <input type="text" id="editNote">
        </div>
        <div class="modal-btns">
            <button class="btn-edit" onclick="saveEditRecord()">保存修改</button>
            <button class="btn-clear" onclick="closeEditModal()">取消</button>
        </div>
    </div>
</div>

<script>
const STOCK_KEY = "stock_data";
const RECORD_KEY = "record_data";
let editKey = "";

function getStorage(key){
    let s = localStorage.getItem(key);
    if(!s) return key === STOCK_KEY ? {} : [];
    try{return JSON.parse(s)}catch{return key === STOCK_KEY ? {} : []}
}
function setStorage(key,val){
    localStorage.setItem(key,JSON.stringify(val));
}

// 计算相差天数
function getDayDiff(startDateStr, endDateStr){
    if(!startDateStr) return null;
    const start = new Date(startDateStr);
    const end = new Date(endDateStr);
    const diffTime = end - start;
    return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
}

// 计算相差整月
function getMonthDiff(startDateStr, endDateStr){
    if(!startDateStr) return null;
    const start = new Date(startDateStr);
    const end = new Date(endDateStr);
    let months = (end.getFullYear() - start.getFullYear()) * 12;
    months += end.getMonth() - start.getMonth();
    if(end.getDate() < start.getDate()) months--;
    return months;
}

// 导出备份
function exportAllData(){
    let stock = getStorage(STOCK_KEY);
    let records = getStorage(RECORD_KEY);
    const backupData = {
        stock: stock,
        records: records,
        exportTime: new Date().toLocaleString(),
        desc: "恩施市CDC物资系统备份"
    };
    const jsonStr = JSON.stringify(backupData,null,2);
    const blob = new Blob([jsonStr],{type:"application/json;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `物资备份_${new Date().toLocaleDateString()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert("备份文件已下载！\n查找：微信【我】→【文件】→【下载】\n⚠ 警告：文件不要转发他人，转发会损坏无法导入");
}

// 修复导入：强制UTF8读取，多重校验，捕获所有解析异常
function importAllData(fileDom){
    const file = fileDom.files[0];
    if(!file){
        fileDom.value = "";
        return alert("未选择文件");
    }
    const reader = new FileReader();
    reader.onerror = function(){
        alert("文件读取失败：文件损坏/微信传输破坏，请重新导出备份");
        fileDom.value = "";
    };
    // 强制UTF8编码读取，解决中文乱码解析失败
    reader.readAsText(file,"UTF-8");
    reader.onload = function(e){
        try{
            const rawText = e.target.result.trim();
            if(!rawText){
                throw new Error("文件为空，损坏");
            }
            const data = JSON.parse(rawText);
            // 严格校验备份必备字段
            if(typeof data.stock === "undefined" || typeof data.records === "undefined"){
                throw new Error("缺少stock/records字段，不是本页面导出备份");
            }
            if(!confirm("导入会覆盖当前所有库存、记录，确定继续？")){
                fileDom.value = "";
                return;
            }
            setStorage(STOCK_KEY, data.stock);
            setStorage(RECORD_KEY, data.records);
            loadType();
            renderStock();
            renderRecord();
            alert("✅导入成功，数据已刷新");
        }catch(err){
            alert(`❌导入失败：${err.message}\n解决方法：返回页面重新导出备份，不要转发文件`);
        }
        // 清空输入框，支持重复选同一文件
        fileDom.value = "";
    };
}

function toggleCustomDept(){
    let sel = document.getElementById("out_dept");
    let inp = document.getElementById("custom_dept");
    inp.classList.toggle("hide",sel.value !== "其他");
}
function getDeptName(){
    let val = document.getElementById("out_dept").value.trim();
    if(val === "其他") return document.getElementById("custom_dept").value.trim();
    return val;
}
function trimAll(s){
    return String(s).trim().replace(/\s/g,"");
}

function clearOutValid(){
    document.getElementById("out_valid_show").value = "";
    document.getElementById("show_stock").value = "";
}

function showStockAndValid(){
    let t = trimAll(document.getElementById("out_type").value);
    let f = trimAll(document.getElementById("out_factory").value);
    let s = trimAll(document.getElementById("out_spec").value);
    const stock = getStorage(STOCK_KEY);
    const key = `${t}_${f}_${s}`;
    const item = stock[key];
    if(!item){
        clearOutValid();
        return;
    }
    document.getElementById("show_stock").value = item.num;
    document.getElementById("out_valid_show").value = item.validDate || "无";
}

function loadType(){
    let stock = getStorage(STOCK_KEY);
    let typeSel = document.getElementById("out_type");
    typeSel.innerHTML = "<option value=''>请选择类别</option>";
    let types = new Set();
    for(let k in stock){
        let t = trimAll(stock[k].type);
        if(t) types.add(t);
    }
    types.forEach(t=>type.innerHTML += `<option value="${t}">${t}</option>`);
    document.getElementById("out_factory").innerHTML = "<option value=''>请选择厂家</option>";
    document.getElementById("out_spec").innerHTML = "<option value=''>请选择规格</option>";
    clearOutValid();
}
function loadFactory(){
    let stock = getStorage(STOCK_KEY);
    let facSel = document.getElementById("out_factory");
    facSel.innerHTML = "<option value=''>请选择厂家</option>";
    let facs = new Set();
    for(let k in stock){
        let item = stock[k];
        if(trimAll(item.type) === trimAll(document.getElementById("out_type").value)) facs.add(trimAll(item.factory));
    }
    facs.forEach(f=>facSel.innerHTML += `<option value="${f}">${f}</option>`);
    document.getElementById("out_spec").innerHTML = "<option value=''>请选择规格</option>";
    clearOutValid();
}
function loadSpec(){
    let selType = trimAll(document.getElementById("out_type").value);
    let selFac = trimAll(document.getElementById("out_factory").value);
    let stock = getStorage(STOCK_KEY);
    let specSel = document.getElementById("out_spec");
    specSel.innerHTML = "<option value=''>请选择规格</option>";
    let specs = new Set();
    for(let k in stock){
        let item = stock[k];
        if(trimAll(item.type) === selType && trimAll(item.factory) === selFac){
            specs.add(trimAll(item.spec));
        }
    }
    specs.forEach(s=>specSel.innerHTML += `<option value="${s}">${s}</option>`);
    clearOutValid();
}

function clearInInput(){
    ["in_type","in_factory","in_spec","in_num","in_valid_date","in_note"].forEach(id=>document.getElementById(id).value="");
    editKey = "";
    document.getElementById("editTip").innerText = "";
}
function resetOut(){
    ["out_num","out_user","out_note","custom_dept","show_stock","out_valid_show"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("out_dept").value = "";
    document.getElementById("out_type").innerHTML = "<option value=''>请选择类别</option>";
    document.getElementById("out_factory").innerHTML = "<option value=''>请选择厂家</option>";
    document.getElementById("out_spec").innerHTML = "<option value=''>请选择规格</option>";
    toggleCustomDept();
    loadType();
}

function editStock(key){
    let stock = getStorage(STOCK_KEY);
    let item = stock[key];
    document.getElementById("in_type").value = item.type;
    document.getElementById("in_factory").value = item.factory;
    document.getElementById("in_spec").value = item.spec;
    document.getElementById("in_num").value = item.num;
    document.getElementById("in_valid_date").value = item.validDate || "";
    editKey = key;
    document.getElementById("editTip").innerText = "编辑模式，修改后确认入库更新";
}
function delStock(key){
    if(!confirm("确定删除该库存？不可恢复")) return;
    let stock = getStorage(STOCK_KEY);
    delete stock[key];
    setStorage(STOCK_KEY,stock);
    renderStock();
    loadType();
}

function stockIn(){
    let type = trimAll(document.getElementById("in_type").value);
    let factory = trimAll(document.getElementById("in_factory").value);
    let spec = trimAll(document.getElementById("in_spec").value);
    let numStr = document.getElementById("in_num").value.trim();
    let num = Number(numStr);
    let validDate = document.getElementById("in_valid_date").value;
    let note = document.getElementById("in_note").value.trim();

    if(!type) return alert("请填写类别");
    if(!factory) return alert("请填写厂家");
    if(!spec) return alert("请填写规格");
    if(!numStr || num <= 0) return alert("数量必须大于0");

    let newKey = `${type}_${factory}_${spec}`;
    let stock = getStorage(STOCK_KEY);
    if(editKey && editKey !== newKey) delete stock[editKey];
    stock[newKey] = {type,factory,spec,num,validDate};
    setStorage(STOCK_KEY,stock);

    let records = getStorage(RECORD_KEY);
    records.unshift({
        time:new Date().toLocaleString(),
        type,factory,spec,num,validDate,
        dept:"",user:"",opt:editKey?"编辑库存":"入库",note
    });
    setStorage(RECORD_KEY,records);
    renderStock();renderRecord();clearInInput();loadType();
    alert(editKey?"修改成功":"入库成功");
}

function stockOut(){
    try{
        let t = trimAll(document.getElementById("out_type").value);
        let f = trimAll(document.getElementById("out_factory").value);
        let s = trimAll(document.getElementById("out_spec").value);
        let numStr = document.getElementById("out_num").value.trim();
        let outNum = Number(numStr);
        let dept = getDeptName();
        let user = document.getElementById("out_user").value.trim();
        let stockNow = Number(document.getElementById("show_stock").value);
        let showValid = document.getElementById("out_valid_show").value;
        let validSave = showValid === "无" ? null : showValid;

        if(!t || !f || !s) return alert("请完整选择类别、厂家、规格");
        if(!numStr || outNum <=0) return alert("出库数量大于0");
        if(!dept) return alert("请选择领用单位");
        if(!user) return alert("填写领用人");
        if(stockNow <=0) return alert("无库存");
        if(outNum > stockNow) return alert(`库存不足，现有${stockNow}`);

        let key = `${t}_${f}_${s}`;
        let stock = getStorage(STOCK_KEY);
        stock[key].num -= outNum;
        if(stock[key].num <= 0) delete stock[key];
        setStorage(STOCK_KEY,stock);

        let records = getStorage(RECORD_KEY);
        records.unshift({
            time:new Date().toLocaleString(),
            type:t,factory:f,spec:s,num:outNum,validDate:validSave,
            dept,user,opt:"出库",note:document.getElementById("out_note").value.trim()
        });
        setStorage(RECORD_KEY,records);
        renderStock();renderRecord();resetOut();
        alert("出库成功");
    }catch(e){
        alert("操作失败："+e.message);
    }
}

// 删除单条记录
function delRec(idx){
    let records = getStorage(RECORD_KEY);
    let recItem = records[idx];
    let key = `${trimAll(recItem.type)}_${trimAll(recItem.factory)}_${trimAll(recItem.spec)}`;
    let stock = getStorage(STOCK_KEY);
    let stockItem = stock[key];
    if(!confirm("删除本条记录，库存同步回滚，确定？")) return;
    if(recItem.opt === "入库"){
        if(stockItem){
            stockItem.num -= recItem.num;
            if(stockItem.num <= 0) delete stock[key];
        }
    }else if(recItem.opt === "出库"){
        if(stockItem){
            stockItem.num += recItem.num;
        }else{
            stock[key] = {type:recItem.type,factory:recItem.factory,spec:recItem.spec,num:recItem.num,validDate:recItem.validDate}
        }
    }
    setStorage(STOCK_KEY, stock);
    records.splice(idx,1);
    setStorage(RECORD_KEY, records);
    renderStock();renderRecord();loadType();
}

// 打开编辑弹窗
function openEditModal(index){
    const records = getStorage(RECORD_KEY);
    const item = records[index];
    document.getElementById("editIndex").value = index;
    document.getElementById("editOptType").value = item.opt;
    document.getElementById("editType").value = item.type;
    document.getElementById("editFactory").value = item.factory;
    document.getElementById("editSpec").value = item.spec;
    document.getElementById("editNum").value = item.num;
    document.getElementById("editValid").value = item.validDate || "";
    document.getElementById("editDept").value = item.dept || "";
    document.getElementById("editUser").value = item.user || "";
    document.getElementById("editNote").value = item.note || "";
    document.getElementById("editModal").style.display = "flex";
}
// 关闭弹窗
function closeEditModal(){
    document.getElementById("editModal").style.display = "none";
}
// 保存编辑记录
function saveEditRecord(){
    const idx = Number(document.getElementById("editIndex").value);
    const records = getStorage(RECORD_KEY);
    const oldItem = records[idx];
    const oldKey = `${trimAll(oldItem.type)}_${trimAll(oldItem.factory)}_${trimAll(oldItem.spec)}`;
    let stock = getStorage(STOCK_KEY);
    let oldStockItem = stock[oldKey];
    if(oldItem.opt === "入库"){
        if(oldStockItem){
            oldStockItem.num -= oldItem.num;
            if(oldStockItem.num <=0) delete stock[oldKey];
        }
    }else if(oldItem.opt === "出库"){
        if(oldStockItem){
            oldStockItem.num += oldItem.num;
        }else{
            stock[oldKey] = {type:oldItem.type,factory:oldItem.factory,spec:oldItem.spec,num:oldItem.num,validDate:oldItem.validDate}
        }
    }
    setStorage(STOCK_KEY, stock);

    const newOpt = document.getElementById("editOptType").value;
    const newType = trimAll(document.getElementById("editType").value);
    const newFac = trimAll(document.getElementById("editFactory").value);
    const newSpec = trimAll(document.getElementById("editSpec").value);
    const newNum = Number(document.getElementById("editNum").value);
    const newValid = document.getElementById("editValid").value || null;
    const newDept = document.getElementById("editDept").value.trim();
    const newUser = document.getElementById("editUser").value.trim();
    const newNote = document.getElementById("editNote").value.trim();
    if(!newType || !newFac || !newSpec || newNum <=0){
        alert("类别、厂家、规格不能为空，数量大于0");
        return;
    }
    const newKey = `${newType}_${newFac}_${newSpec}`;
    stock = getStorage(STOCK_KEY);
    if(!stock[newKey]) stock[newKey] = {type:newType,factory:newFac,spec:newSpec,num:0,validDate:newValid};
    if(newOpt === "入库"){
        stock[newKey].num += newNum;
        stock[newKey].validDate = newValid;
    }else{
        if(stock[newKey].num < newNum){
            alert("修改后出库数量不能大于现有库存，请调整");
            setStorage(STOCK_KEY, stock);
            renderStock();renderRecord();
            return;
        }
        stock[newKey].num -= newNum;
        stock[newKey].valid = newValid;
        if(stock[newKey].num <=0) delete stock[newKey];
    }
    setStorage(STOCK_KEY, stock);
    records[idx] = {
        time:oldItem.time,
        type:newType,
        factory:newFac,
        spec:newSpec,
        num:newNum,
        validDate:newValid,
        dept:newDept,
        user:newUser,
        opt:newOpt,
        note:newNote
    };
    setStorage(RECORD_KEY, records);
    closeEditModal();
    renderStock();renderRecord();loadType();
    alert("修改保存成功");
}

function delAllRecords(){
    if(!confirm("警告：删除全部记录，所有库存同步回滚，数据无法恢复！")) return;
    let records = getStorage(RECORD_KEY);
    let stock = getStorage(STOCK_KEY);
    records.forEach(recItem => {
        let key = `${trimAll(recItem.type)}_${trimAll(recItem.factory)}_${trimAll(recItem.spec)}`;
        let stockItem = stock[key];
        if(recItem.opt === "入库"){
            if(stockItem){
                stockItem.num -= recItem.num;
                if(stockItem.num <= 0) delete stock[key];
            }
        }else if(recItem.opt === "出库"){
            if(stockItem){
                stockItem.num += recItem.num;
            }else{
                stock[key] = {type:recItem.type,factory:recItem.factory,spec:recItem.spec,num:recItem.num,validDate:recItem.validDate}
            }
        }
    });
    setStorage(STOCK_KEY, stock);
    setStorage(RECORD_KEY, []);
    renderStock();renderRecord();loadType();
    alert("全部记录已清空，库存同步回滚完成");
}

function renderStock(){
    const today = new Date().toISOString().split('T')[0];
    let stock = getStorage(STOCK_KEY);
    let tbody = document.querySelector("#stock_table tbody");
    tbody.innerHTML = "";
    for(let k in stock){
        let item = stock[k];
        let num = Number(item.num);
        let validDate = item.validDate;

        let stockText = num;
        let stockClass = "";
        if(num < 100){
            stockText = num + " 不足！";
            stockClass = "low-stock";
        }

        let validText = "-";
        let validClass = "";
        if(validDate){
            const dayLeft = getDayDiff(today, validDate);
            if(dayLeft < 0){
                validText = "已过期";
                validClass = "low-valid";
            }else if(dayLeft < 30){
                validText = dayLeft + " 天 近效期！";
                validClass = "low-valid";
            }else{
                const monthLeft = getMonthDiff(today, validDate);
                validText = monthLeft + " 个月";
                if(monthLeft < 3){
                    validText = monthLeft + " 个月 近效期！";
                    validClass = "low-valid";
                }
            }
        }

        tbody.innerHTML += `
        <tr>
            <td>${item.type}</td>
            <td>${item.factory}</td>
            <td>${item.spec}</td>
            <td class="${stockClass}">${stockText}</td>
            <td class="${validClass}">${validText}</td>
            <td></td>
        </tr>`;
    }
}

function renderRecord(){
    let records = getStorage(RECORD_KEY);
    let tbody = document.querySelector("#record_table tbody");
    tbody.innerHTML = "";
    records.forEach((item,i)=>{
        let color;
        if(item.opt=="入库") color="#00b42a";
        else if(item.opt=="出库") color="#ff7700";
        let validShow = item.validDate ? item.validDate : "-";
        tbody.innerHTML += `
        <tr>
            <td>${item.time}</td>
            <td>${item.type}</td>
            <td>${item.factory}</td>
            <td>${item.spec}</td>
            <td>${item.num}</td>
            <td>${validShow}</td>
            <td>${item.dept||"-"}</td>
            <td>${item.user||"-"}</td>
            <td style="color:${color}">${item.opt}</td>
            <td>${item.note||"-"}</td>
            <td>
                <button class="btn-edit" onclick="openEditModal(${i})">编辑</button>
                <button class="btn-del" onclick="delRec(${i})" style="margin-left:4px">删</button>
            </td>
        </tr>`;
    })
}

function exportRecord(){
    let records = getStorage(RECORD_KEY);
    if(records.length === 0){
        alert("暂无记录，无法导出");
        return;
    }
    let csv = "操作时间,类别,厂家,规格,数量,效期截止日,领用单位,领用人,操作类型,备注\n";
    records.forEach(item=>{
        let validShow = item.validDate || "";
        let line = [
            `"${item.time}"`,
            `"${item.type}"`,
            `"${item.factory}"`,
            `"${item.spec}"`,
            `"${item.num}"`,
            `"${validShow}"`,
            `"${item.dept||"-"}"`,
            `"${item.user||"-"}"`,
            `"${item.opt}"`,
            `"${item.note||"-"}"`
        ].join(",");
        csv += line + "\n";
    });
    let blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = `物资出入库记录_${new Date().toLocaleDateString()}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

window.onload = function(){
    toggleCustomDept();
    loadType();
    renderStock();
    renderRecord();
}
</script>
