<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>物资出入库管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft Yahei",sans-serif;font-size:14px}
body{max-width:100%;margin:10px auto;padding:0 8px;background:#f5f7fa}
.main-title{text-align:center;font-size:20px;font-weight:bold;margin:15px 0 4px 0;color:#222}
.sub-title{text-align:center;font-size:16px;font-weight:normal;margin-bottom:15px;color:#333}
h2{margin:8px 0;color:#222;font-size:16px}
.box{background:#fff;padding:12px;border-radius:8px;box-shadow:0 1px 6px #ddd;margin-bottom:15px}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
input,select,label{padding:6px 4px;border:1px solid #ccc;border-radius:4px;font-size:14px}
input[readonly]{background:#eee;color:#666}
.hide{display:none!important}
.edit-tip{color:#f53f3f;font-weight:bold}
button{padding:7px 10px;border:none;border-radius:4px;cursor:pointer;color:#fff;font-size:13px;white-space:nowrap}
.btn-in{background:#00b42a}
.btn-out{background:#ff7700}
.btn-del{background:#f53f3f}
.btn-edit{background:#4096ff}
.btn-clear{background:#86909c}
.btn-export{background:#1677ff}
.btn-backup{background:#009688}
.btn-import{background:#722ed1}
table{width:100%;border-collapse:collapse;margin-top:8px}
table th,table td{border:1px solid #e5e6eb;padding:6px 2px;text-align:center;font-size:12px}
table th{background:#f2f3f5}
#in_num {width: 80px;min-width: 80px;}
#out_num {width: 80px;min-width: 80px;}
#show_stock {width: 70px;min-width: 70px;}
#out_dept {width: 80px;min-width: 80px;}
#out_user {width: 80px;min-width: 80px;}
#in_valid_date {width: 130px;min-width:130px;}
#out_valid_show {width:120px;min-width:120px;}
#out_date {width: 130px;min-width:130px;}
#in_type,#in_factory,#in_spec,#in_note,#custom_dept {min-width: 110px;}
.low-stock {color: #f53f3f;font-weight: bold;}
.low-valid {color: #f53f3f;font-weight: bold;}
#fileInput{display: none;}
.table-wrap{overflow-x:auto; -webkit-overflow-scrolling: touch;}
.modal-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999;}
.modal-box{background:#fff;width:92%;max-width:520px;padding:16px;border-radius:8px;max-height:90vh;overflow-y:auto;}
.modal-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;align-items:center}
.modal-row label{width:90px;text-align:right;border:none;padding:0}
.modal-row input,.modal-row select{flex:1;min-width:120px}
.modal-btns{display:flex;gap:10px;justify-content:center;margin-top:16px}
</style>
</head>
<body>
<div class="main-title">物资出入库管理</div>
<div class="sub-title">（恩施市CDC重大疾病科制作）</div>

<div class="box">
<h2>数据备份/迁移</h2>
<div class="row">
<button class="btn-backup" onclick="exportAllData()">导出全部数据备份</button>
<button class="btn-import" onclick="document.getElementById('fileInput').click()">导入备份文件</button>
<input type="file" id="fileInput" accept=".json" onchange="importAllData(this)">
</div>
<span style="color:#666;font-size:12px">提示：微信关闭页面缓存会丢失数据，建议经常导出备份</span>
</div>

<div class="box">
<h2>物资入库 <span class="edit-tip" id="editTip"></span></h2>
<div class="row">
<input type="text" id="in_type" placeholder="类别名称">
<input type="text" id="in_factory" placeholder="厂家">
<input type="text" id="in_spec" placeholder="规格">
<input type="number" id="in_num" placeholder="数量" min="1">
<label>效期</label><input type="date" id="in_valid_date">
<input type="text" id="in_note" placeholder="备注">
<button class="btn-in" onclick="stockIn()">确认入库</button>
<button class="btn-clear" onclick="clearInInput()">清空</button>
</div>
<span style="color:#999;font-size:12px">效期日期选填，不选代表无有效期</span>
</div>

<div class="box">
<h2>物资出库</h2>
<div class="row">
<select id="out_type" onchange="loadFactory();clearOutValid()">
<option value="">请选择类别</option>
</select>
<select id="out_factory" onchange="loadSpec();clearOutValid()">
<option value="">请选择厂家</option>
</select>
<select id="out_spec" onchange="showStockAndValid()">
<option value="">请选择规格</option>
</select>
<input type="number" id="out_num" placeholder="出库数" min="1">
<input readonly id="out_valid_show" placeholder="效期截止日">
<label>时间</label><input type="date" id="out_date">
<select id="out_dept" onchange="toggleCustomDept()">
<option value="">领用单位</option>
<option value="舞阳坝">舞阳坝</option>
<option value="小渡船">小渡船</option>
<option value="金子坝">金子坝</option>
<option value="七里坪">七里坪</option>
<option value="六角亭">六角亭</option>
<option value="三岔">三岔</option>
<option value="新塘">新塘</option>
<option value="红土">红土</option>
<option value="屯堡">屯堡</option>
<option value="沐抚">沐抚</option>
<option value="板桥">板桥</option>
<option value="白果">白果</option>
<option value="盛家">盛家</option>
<option value="芭蕉">芭蕉</option>
<option value="沙地">沙地</option>
<option value="崔坝">崔坝</option>
<option value="龙凤">龙凤</option>
<option value="太阳">太阳</option>
<option value="白杨">白杨</option>
<option value="其他">其他</option>
</select>
<input type="text" id="custom_dept" class="hide" placeholder="填写单位">
<input type="text" id="out_user" placeholder="领用人">
<input id="out_note" placeholder="备注">
<input readonly id="show_stock" placeholder="库存">
<button class="btn-out" onclick="stockOut()">确认出库</button>
<button class="btn-clear" onclick="resetOut()">清空</button>
</div>
</div>

<div class="box">
<h2>全部库存清单</h2>
<div class="table-wrap">
<table id="stock_table">
<thead>
<tr>
<th>类别</th>
<th>厂家</th>
<th>规格</th>
<th>库存</th>
<th>有效期(月)</th>
</tr>
<tbody></tbody>
</table>
</div>
</div>

<div class="box">
<div class="row" style="justify-content: space-between;align-items:center;">
<h2>出入库操作记录</h2>
<div class="row">
<button class="btn-export" onclick="exportRecord()">导出CSV报表</button>
<button class="btn-del" onclick="delAllRecords()">删除全部记录</button>
</div>
</div>
<div class="table-wrap">
<table id="record_table">
<thead>
<tr>
<th>操作时间</th>
<th>类别</th>
<th>厂家</th>
<th>规格</th>
<th>数量</th>
<th>效期截止日</th>
<th>时间</th>
<th>领用单位</th>
<th>领用人</th>
<th>类型</th>
<th>备注</th>
<th>操作</th>
</tr>
<tbody></tbody>
</table>
</div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-mask" id="editModal">
    <div class="modal-box">
        <h3 style="text-align:center;margin-bottom:12px">编辑记录</h3>
        <input type="hidden" id="editIndex">
        <div class="modal-row">
            <label>操作类型</label>
            <select id="editOptType">
                <option value="入库">入库</option>
                <option value="出库">出库</option>
            </select>
        </div>
        <div class="modal-row">
            <label>类别</label>
            <input type="text" id="editType">
        </div>
        <div class="modal-row">
            <label>厂家</label>
            <input type="text" id="editFactory">
        </div>
        <div class="modal-row">
            <label>规格</label>
            <input type="text" id="editSpec">
        </div>
        <div class="modal-row">
            <label>数量</label>
            <input type="number" min="1" id="editNum">
        </div>
        <div class="modal-row">
            <label>效期截止日</label>
            <input type="date" id="editValid">
        </div>
        <div class="modal-row">
            <label>时间</label>
            <input type="date" id="editTime">
        </div>
        <div class="modal-row">
            <label>领用单位</label>
            <input type="text" id="editDept">
        </div>
        <div class="modal-row">
            <label>领用人</label>
            <input type="text" id="editUser">
        </div>
        <div class="modal-row">
            <label>备注</label>
            <input type="text" id="editNote">
        </div>
        <div class="modal-btns">
            <button class="btn-edit" onclick="saveEditRecord()">保存修改</button>
            <button class="btn-clear" onclick="closeEditModal()">取消</button>
        </div>
    </div>
</div>

<script>
const STOCK_KEY = "stock_data";
const RECORD_KEY = "record_data";
let editKey = "";

// 获取当前标准日期 yyyy-mm-dd
function getNowDate(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
}
// 展示格式化 2026/6/19
function formatShow(dStr){
    if(!dStr){
        const d = new Date();
        return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    }
    const d = new Date(dStr);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}
function getStorage(key){
    let s = localStorage.getItem(key);
    if(!s) return key === STOCK_KEY ? {} : [];
    try{return JSON.parse(s);}catch{return key === STOCK_KEY ? {} : [];}
}
function setStorage(key,val){
    localStorage.setItem(key,JSON.stringify(val));
}
function getDayDiff(s,e){
    if(!s||!e)return null;
    const a=new Date(s),b=new Date(e);
    return Math.ceil((b-a)/(1000*60*60*24));
}
function getMonthDiff(s,e){
    if(!s||!e)return null;
    const a=new Date(s),b=new Date(e);
    let m=(b.getFullYear()-a.getFullYear())*12;
    m+=b.getMonth()-a.getMonth();
    if(b.getDate()<a.getDate())m--;
    return m;
}

// 新增：清理库存中数量≤0的项
function cleanZeroStock() {
    const stock = getStorage(STOCK_KEY);
    for (let k in stock) {
        if (stock[k].num <= 0) {
            delete stock[k];
        }
    }
    setStorage(STOCK_KEY, stock);
}

// 导出备份
function exportAllData(){
    const stock=getStorage(STOCK_KEY);
    const records=getStorage(RECORD_KEY);
    const obj={stock,records,exportTime:getNowDate()};
    const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`物资备份_${getNowDate()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    alert("备份已下载，请保存");
}
// 导入备份
function importAllData(dom){
    const f=dom.files[0];
    if(!f){dom.value="";return;}
    const r=new FileReader();
    r.onload=function(ev){
        try{
            const data=JSON.parse(ev.target.result);
            if(!data.stock||!data.records){alert("备份文件格式错误");return;}
            if(!confirm("导入覆盖现有数据？")){dom.value="";return;}
            setStorage(STOCK_KEY,data.stock);
            setStorage(RECORD_KEY,data.records);
            // 导入后清理0库存
            cleanZeroStock();
            loadType();renderStock();renderRecord();
            alert("导入成功");
        }catch(err){alert("文件损坏");}
        dom.value="";
    }
    r.readAsText(f);
}
function toggleCustomDept(){
    const sel=document.getElementById("out_dept");
    document.getElementById("custom_dept").classList.toggle("hide",sel.value!=="其他");
}
function getDept(){
    const v=document.getElementById("out_dept").value.trim();
    return v==="其他"?document.getElementById("custom_dept").value.trim():v;
}
function trim(s){return String(s).trim();}
function clearOutValid(){
    document.getElementById("out_valid_show").value="";
    document.getElementById("show_stock").value="";
}
function showStockAndValid(){
    const t=trim(document.getElementById("out_type").value);
    const f=trim(document.getElementById("out_factory").value);
    const spec=trim(document.getElementById("out_spec").value);
    const stock=getStorage(STOCK_KEY);
    const k=`${t}_${f}_${spec}`;
    if(stock[k])document.getElementById("out_valid_show").value=stock[k].validDate||"无";
    document.getElementById("show_stock").value=stock[k]?.num||0;
}
function loadType(){
    const sel=document.getElementById("out_type");
    sel.innerHTML="<option value=''>请选择类别</option>";
    const stock=getStorage(STOCK_KEY);
    const set=new Set();
    for(let k in stock)set.add(stock[k].type);
    set.forEach(x=>sel.innerHTML+=`<option value="${x}">${x}</option>`);
    document.getElementById("out_factory").innerHTML="<option value=''>请选择厂家</option>";
    document.getElementById("out_spec").innerHTML="<option value=''>请选择规格</option>";
    clearOutValid();
}
function loadFactory(){
    const t=trim(document.getElementById("out_type").value);
    const sel=document.getElementById("out_factory");
    sel.innerHTML="<option value=''>请选择厂家</option>";
    const stock=getStorage(STOCK_KEY);
    const set=new Set();
    for(let k in stock)if(stock[k].type===t)set.add(stock[k].factory);
    set.forEach(x=>sel.innerHTML+=`<option value="${x}">${x}</option>`);
    document.getElementById("out_spec").innerHTML="<option value=''>请选择规格</option>";
    clearOutValid();
}
function loadSpec(){
    const t=trim(document.getElementById("out_type").value);
    const f=trim(document.getElementById("out_factory").value);
    const sel=document.getElementById("out_spec");
    sel.innerHTML="<option value=''>请选择规格</option>";
    const stock=getStorage(STOCK_KEY);
    const set=new Set();
    for(let k in stock)if(stock[k].type===t&&stock[k].factory===f)set.add(stock[k].spec);
    set.forEach(x=>sel.innerHTML+=`<option value="${x}">${x}</option>`);
    clearOutValid();
}
function clearInInput(){
    ["in_type","in_factory","in_spec","in_num","in_valid_date","in_note"].forEach(id=>document.getElementById(id).value="");
    editKey="";
    document.getElementById("editTip").innerText="";
}
function resetOut(){
    ["out_num","out_date","out_note","custom_dept","show_stock","out_valid_show","out_user"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("out_dept").value="";
    document.getElementById("out_type").innerHTML="<option value=''>请选择类别</option>";
    document.getElementById("out_factory").innerHTML="<option value=''>请选择厂家</option>";
    document.getElementById("out_spec").innerHTML="<option value=''>请选择规格</option>";
    toggleCustomDept();
    loadType();
}
// 入库
function stockIn(){
    const t=trim(document.getElementById("in_type").value);
    const f=trim(document.getElementById("in_factory").value);
    const spec=trim(document.getElementById("in_spec").value);
    const num=Number(trim(document.getElementById("in_num").value));
    const valid=document.getElementById("in_valid_date").value;
    const note=trim(document.getElementById("in_note").value);
    if(!t||!f||!spec||num<=0){alert("请填写完整信息，数量大于0");return;}
    const key=`${t}_${f}_${spec}`;
    const stock=getStorage(STOCK_KEY);
    if(editKey&&editKey!==key)delete stock[editKey];
    stock[key]={type:t,factory:f,spec:spec,num:num,validDate:valid};
    setStorage(STOCK_KEY,stock);
    // 入库后清理0库存
    cleanZeroStock();
    const records=getStorage(RECORD_KEY);
    records.unshift({
        time:formatShow(""),rawTime:getNowDate(),
        type:t,factory:f,spec:spec,num:num,validDate:valid,
        dept:"",user:"",opt:"入库",note:note,outTime:""
    });
    setStorage(RECORD_KEY,records);
    renderStock();renderRecord();clearInInput();loadType();
    alert(editKey?"修改成功":"入库成功");
}
// 出库
function stockOut(){
    try{
        const t=trim(document.getElementById("out_type").value);
        const f=trim(document.getElementById("out_factory").value);
        const spec=trim(document.getElementById("out_spec").value);
        const num=Number(trim(document.getElementById("out_num").value));
        const dept=getDept();
        const user=trim(document.getElementById("out_user").value);
        const stockNum=Number(document.getElementById("show_stock").value);
        const valid=document.getElementById("out_valid_show").value==="无"?null:document.getElementById("out_valid_show").value;
        const dVal=document.getElementById("out_date").value;
        if(!t||!f||!spec||num<=0||!dept||!user){alert("填写完整出库信息");return;}
        if(stockNum<num){alert("库存不足");return;}
        const key=`${t}_${f}_${spec}`;
        const stock=getStorage(STOCK_KEY);
        stock[key].num-=num;
        // 确保库存为0时删除
        if(stock[key].num <= 0) delete stock[key];
        setStorage(STOCK_KEY,stock);
        // 出库后清理0库存
        cleanZeroStock();
        const records=getStorage(RECORD_KEY);
        records.unshift({
            time:formatShow(dVal),rawTime:dVal||getNowDate(),
            type:t,factory:f,spec:spec,num:num,validDate:valid,
            dept:dept,user:user,opt:"出库",note:"",outTime:dVal
        });
        setStorage(RECORD_KEY,records);
        renderStock();renderRecord();resetOut();
        alert("出库成功");
    }catch(e){alert("操作异常："+e.message);}
}
// 删除单条记录
function delRec(idx){
    const records=getStorage(RECORD_KEY);
    const item=records[idx];
    const k=`${item.type}_${item.factory}_${item.spec}`;
    const stock=getStorage(STOCK_KEY);
    if(!confirm("删除本条记录，库存同步回滚？"))return;
    if(item.opt==="入库"){
        if(stock[k]){stock[k].num-=item.num;if(stock[k].num<=0)delete stock[k];}
    }else{
        if(!stock[k])stock[k]={type:item.type,factory:item.factory,spec:item.spec,num:0,validDate:item.validDate};
        stock[k].num+=item.num;
    }
    setStorage(STOCK_KEY,stock);
    // 删除记录后清理0库存
    cleanZeroStock();
    records.splice(idx,1);
    setStorage(RECORD_KEY,records);
    renderStock();renderRecord();loadType();
}
// 清空全部记录（同步清空库存）
function delAllRecords(){
    if(!confirm("确认清空所有操作记录和库存数据？此操作不可恢复！"))return;
    // 清空库存数据
    setStorage(STOCK_KEY, {});
    // 清空操作记录数据
    setStorage(RECORD_KEY, []);
    // 重新渲染页面（清空表格）
    renderStock();
    renderRecord();
    // 重新加载出库的类别下拉框（清空后无数据）
    loadType();
    alert("操作记录和库存数据已全部清空");
}
// 打开编辑弹窗
function openEditModal(idx){
    const records=getStorage(RECORD_KEY);
    const item=records[idx];
    document.getElementById("editIndex").value=idx;
    document.getElementById("editOptType").value=item.opt;
    document.getElementById("editType").value=item.type;
    document.getElementById("editFactory").value=item.factory;
    document.getElementById("editSpec").value=item.spec;
    document.getElementById("editNum").value=item.num;
    document.getElementById("editValid").value=item.validDate||"";
    document.getElementById("editTime").value=item.rawTime||"";
    document.getElementById("editDept").value=item.dept||"";
    document.getElementById("editUser").value=item.user||"";
    document.getElementById("editNote").value=item.note||"";
    document.getElementById("editModal").style.display="flex";
}
function closeEditModal(){
    document.getElementById("editModal").style.display="none";
}
function saveEditRecord(){
    const idx=Number(document.getElementById("editIndex").value);
    const records=getStorage(RECORD_KEY);
    const old=records[idx];
    const oldKey=`${old.type}_${old.factory}_${old.spec}`;
    let stock=getStorage(STOCK_KEY);
    // 撤销旧数据
    if(old.opt==="入库"){
        if(stock[oldKey]){
            stock[oldKey].num-=old.num;
            if(stock[oldKey].num<=0) delete stock[oldKey];
        }
    }else{
        if(!stock[oldKey]) stock[oldKey]={type:old.type,factory:old.factory,spec:old.spec,num:0,validDate:old.validDate};
        stock[oldKey].num+=old.num;
    }
    setStorage(STOCK_KEY,stock);
    // 新数据
    const t=trim(document.getElementById("editType").value);
    const f=trim(document.getElementById("editFactory").value);
    const spec=trim(document.getElementById("editSpec").value);
    const num=Number(document.getElementById("editNum").value);
    const valid=document.getElementById("editValid").value||null;
    const dVal=document.getElementById("editTime").value;
    const dept=trim(document.getElementById("editDept").value);
    const user=trim(document.getElementById("editUser").value);
    const note=trim(document.getElementById("editNote").value);
    if(!t||!f||!spec||num<=0){alert("信息不全");return;}
    const newKey=`${t}_${f}_${spec}`;
    stock=getStorage(STOCK_KEY);
    if(!stock[newKey]) stock[newKey]={type:t,factory:f,spec:spec,num:0,validDate:valid};
    if(document.getElementById("editOptType").value==="入库"){
        stock[newKey].num+=num;
    }else{
        if(stock[newKey].num<num){alert("库存不足");return;}
        stock[newKey].num-=num;
        if(stock[newKey].num<=0) delete stock[newKey];
    }
    setStorage(STOCK_KEY,stock);
    // 编辑后清理0库存
    cleanZeroStock();
    records[idx]={
        time:formatShow(dVal),rawTime:dVal||getNowDate(),
        type:t,factory:f,spec:spec,num:num,validDate:valid,
        dept:dept,user:user,opt:document.getElementById("editOptType").value,note:note,outTime:dVal
    };
    setStorage(RECORD_KEY,records);
    closeEditModal();renderStock();renderRecord();loadType();
    alert("修改完成");
}
// 渲染库存（无操作按钮）
function renderStock(){
    // 渲染前先清理0库存
    cleanZeroStock();
    const today=getNowDate();
    const stock=getStorage(STOCK_KEY);
    const tbody=document.querySelector("#stock_table tbody");
    tbody.innerHTML="";
    for(let k in stock){
        const item=stock[k];
        const num=item.num;
        const vd=item.validDate;
        let vText="-",vCls="";
        if(vd){
            const diff=getDayDiff(today,vd);
            if(diff<0){vText="已过期";vCls="low-valid";}
            else if(diff<30){vText="近30天到期";vCls="low-valid";}
            else vText=getMonthDiff(today,vd)+"个月";
        }
        tbody.innerHTML+=`<tr>
            <td>${item.type}</td>
            <td>${item.factory}</td>
            <td>${item.spec}</td>
            <td class="${num<100?'low-stock':''}">${num}</td>
            <td class="${vCls}">${vText}</td>
        </tr>`;
    }
}
// 渲染记录（保留操作）
function renderRecord(){
    const records=getStorage(RECORD_KEY);
    const tbody=document.querySelector("#record_table tbody");
    tbody.innerHTML="";
    records.forEach((item,i)=>{
        const c=item.opt==="入库"?"#00b42a":"#ff7700";
        const v=item.validDate||"-";
        const dt=item.outTime?formatShow(item.outTime):"-";
        tbody.innerHTML+=`<tr>
            <td>${item.time}</td>
            <td>${item.type}</td>
            <td>${item.factory}</td>
            <td>${item.spec}</td>
            <td>${item.num}</td>
            <td>${v}</td>
            <td>${dt}</td>
            <td>${item.dept||"-"}</td>
            <td>${item.user||"-"}</td>
            <td style="color:${c}">${item.opt}</td>
            <td>${item.note||"-"}</td>
            <td>
                <button class="btn-edit" onclick="openEditModal(${i})">编辑</button>
                <button class="btn-del" onclick="delRec(${i})">删</button>
            </td>
        </tr>`;
    })
}
// 导出CSV
function exportRecord(){
    const records=getStorage(RECORD_KEY);
    if(records.length===0){alert("无记录");return;}
    let csv="操作时间,类别,厂家,规格,数量,效期截止日,时间,领用单位,领用人,类型,备注\n";
    records.forEach(it=>{
        const v=it.validDate||"";
        const d=it.outTime?formatShow(it.outTime):"";
        csv+=`"${it.time}","${it.type}","${it.factory}","${it.spec}","${it.num}","${v}","${d}","${it.dept||""}","${it.user||""}","${it.opt}","${it.note||""}"\n`;
    });
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`出入库记录_${getNowDate()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}
window.onload=function(){
    // 页面加载时先清理0库存
    cleanZeroStock();
    loadType();renderStock();renderRecord();
}
</script>
